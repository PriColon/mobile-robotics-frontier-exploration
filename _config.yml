title: "Autonomous Frontier Exploration"
description: "Mobile Robotics · ASU Spring 2026"

remote_theme: just-the-docs/just-the-docs

color_scheme: light
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "GitHub Repository":
    - "https://github.com/PriColon/mobile-robotics-frontier-exploration"
aux_links_new_tab: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

repository: PriColon/mobile-robotics-frontier-exploration

exclude:
  - sphinx/
  - Documentation/
  - vendor/
  - README.md
  - Gemfile.lock
  - "*.sh"

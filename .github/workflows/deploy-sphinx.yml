name: Deploy Sphinx to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install sphinx sphinx-rtd-theme myst-parser

      - name: Build Sphinx
        run: sphinx-build -b html sphinx/source sphinx/build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: sphinx/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

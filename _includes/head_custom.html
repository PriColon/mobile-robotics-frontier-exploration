<style>
  pre { overflow-x: auto; }
  img { max-width: 100%; height: auto; }

  .arch-img {
    cursor: zoom-in;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    display: block;
    margin: 0 auto;
    width: 100%;
  }

  .lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.88);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 95%;
    max-height: 92%;
    border-radius: 4px;
  }
  .lightbox-close {
    position: fixed;
    top: 16px; right: 24px;
    color: white;
    font-size: 2.2rem;
    cursor: pointer;
    z-index: 10000;
    line-height: 1;
  }
  .zoom-hint {
    text-align: center;
    font-size: 0.8em;
    color: #888;
    margin-top: 4px;
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll('img').forEach(function(img) {
    if (img.src.includes('architecture')) {
      img.classList.add('arch-img');

      // Add hint below image
      var hint = document.createElement('p');
      hint.className = 'zoom-hint';
      hint.textContent = '🔍 Click image to zoom';
      img.parentNode.insertBefore(hint, img.nextSibling);

      // Create lightbox
      var box = document.createElement('div');
      box.className = 'lightbox';

      var close = document.createElement('span');
      close.className = 'lightbox-close';
      close.innerHTML = '&times;';

      var big = document.createElement('img');
      big.src = img.src;

      box.appendChild(close);
      box.appendChild(big);
      document.body.appendChild(box);

      img.addEventListener('click', function() { box.classList.add('active'); });
      box.addEventListener('click', function() { box.classList.remove('active'); });
    }
  });
});
</script>
